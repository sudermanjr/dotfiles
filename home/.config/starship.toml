command_timeout = 700
add_newline = false
format = """\
    $shlvl\
    ${custom.flox}\
    ${custom.flox-services}\
    $directory\
    $direnv\
    $python\
    $golang\
    $ruby\
    $rust\
    ${custom.fairwinds}\
    ${custom.awsaccount}\
    ${custom.awsduration}\
    $aws\
    ${custom.vault}\
    $kubernetes\
    $git_branch\
    $git_commit\
    $git_state\
    $git_status\
    $fossil_branch\
    $fossil_metrics\
    $line_break\
    $jobs\
    $cmd_duration\
    $character"""

[shlvl]
disabled = false
format = '[\($shlvl\)]($style) '
style = "green"
threshold = 3

[character]
error_symbol = "[вң—](bold bright-red)"
success_symbol = "[в–¶](bold green)"

[directory]
style = "green"
truncation_length = 8
[directory.substitutions]
"~" = "home"

[aws]
disabled = true
style = "dimmed yellow"
symbol = "оҢҪ "
format = "[$symbol$profile(\\($region\\))]($style) "

[gcloud]
disabled = true
symbol = "оҢҪ "

[kubernetes]
symbol = "уұғҫ "
format = "[$symbol$context( \\($namespace\\))]($style) "
style = "bright-blue"
disabled = false
contexts = [
  { context_pattern = 'arn:aws:eks:(?P<var_region>[\w-]+):(?P<var_accountid>[\w-]+):cluster/(?P<var_cluster>[\w-]+)', context_alias = '[eks]$var_cluster' },
  { context_pattern = 'gke_.*_(?P<var_cluster>[\w-]+)', symbol = "" , context_alias = '[gke]$var_cluster' }
]

[custom.fairwinds]
symbol = "оӯ„ "
command = "echo $PROJECT:$INVENTORY"
when = """ test "$PROJECT" != "" """
style = "red"
disabled = true

[custom.flox]
command = "echo $FLOX_PROMPT_ENVIRONMENTS"
symbol = "уұ„… "
when = """ test "$FLOX_PROMPT_ENVIRONMENTS" != "" """
style = "red"

[custom.flox-services]
command = """flox services status --json | jq '. | select(.status=="Running") | .name ' -r"""
symbol = "оӯ» "
when = """test $(flox services status --json | jq '. | select(.status=="Running") | .name ' -r) != "" """
style = "cyan"

[custom.vault]
disabled=false
symbol = "оҜ§ "
command = """bash -c 'echo ${VAULT_AWS_ROLE:-$DEFAULT_VAULT_AWS_ROLE}' """
when = """ test "$VAULT_AWS_ROLE" != "" || test "$DEFAULT_VAULT_AWS_ROLE" != "" """
style = "dimmed yellow"

[custom.awsaccount]
symbol = "оҢҪ "
disabled = true
command = "echo $AWS_ACCOUNT_ALIAS"
when = """ test "$AWS_ACCOUNT_ALIAS" != "" """
ignore_timeout = true
style = "dimmed yellow"

[jobs]
disabled = false
symbol = "&"
style = "yellow"

[git_branch]
disabled = false
format = "[$symbol$branch]($style) "
symbol = "пҗҳ "
style = "purple"

[git_status]
disabled = false
modified = "Вұ"
style = "yellow"

[golang]
symbol = "оҳ§ "
style = "bright-cyan"
format = "[$symbol$version]($style) "

[python]
disabled = false
symbol = "оҳҶ "
format = "[${symbol}${version}( \\($virtualenv\\))]($style) "

[cmd_duration]
min_time = 3000
format = "[$duration]($style) "

[line_break]
disabled = false

[rust]
format = "[$symbol$version]($style) "
symbol = "пҖ“ "

[helm]
disabled = true
format = "[вҺҲ $version](bold white) "

[fossil_branch]
disabled = false

[fossil_metrics]
disabled = false

[direnv]
disabled = false
loaded_msg = 'о«¶ '
unloaded_msg = 'уұ§ө '
symbol = ''
style = 'green'
format = '[$loaded]($style) '
